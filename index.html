<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Her ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loader">
  <h1>Collecting Memories...</h1>
</div>

<div class="cursor"></div>
<div class="cursor2"></div>

<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>
<div class="bg-blur blur3"></div>

<section class="hero">

  <div class="floating-hearts"></div>

  <div class="hero-content">

    <span class="tag">FOR SOMEONE SPECIAL</span>

    <h1>
      I Know
      <span>I Hurt You</span>
    </h1>

    <p>
      This is not just a website.
      It is me trying to express
      what I could not say properly.
    </p>

    <button class="magnetic-btn" onclick="scrollToMemories()">
      Hear Me Out
    </button>

  </div>

</section>

<section class="memories" id="memories">

  <h2>Moments That Stayed With Me</h2>

  <div class="cards">

    <div class="memory-card">
      <img src="images/1.jpg">
      <div class="card-content">
        <h3>Your Smile</h3>
        <p>This smile stayed in my head longer than you know.</p>
      </div>
    </div>

</html>
